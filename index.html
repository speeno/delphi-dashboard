<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>델파이 웹 포팅 - 프로젝트 대시보드</title>
  <script>
  (function () {
    var p = location.pathname;
    if (/\/[^/]+\.html?$/i.test(p)) p = p.replace(/\/[^/]+$/, '/');
    else if (!p.endsWith('/')) p += '/';
    var b = document.createElement('base');
    b.href = location.origin + p;
    var cur = document.currentScript;
    cur.parentNode.insertBefore(b, cur.nextSibling);
  })();
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <div>
        <h1>델파이 도서 물류 시스템 - 웹 포팅 프로젝트</h1>
        <div class="subtitle">8계층 하네스 엔지니어링 기반 무중단 전환</div>
      </div>
      <div class="badge badge-progress">Sprint 0</div>
    </div>
  </header>
  <main class="container">
    <div id="app">
      <div style="text-align:center;padding:60px;color:var(--text-muted)">데이터를 불러오는 중...</div>
    </div>
  </main>
  <footer>
    <div class="container">
      델파이 웹 포팅 프로젝트 &copy; 2026 | 데이터 업데이트: JSON 편집 &rarr; git push
    </div>
  </footer>
  <script src="js/app.js"></script>
</body>
</html>
